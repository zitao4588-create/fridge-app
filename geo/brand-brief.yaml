brand: 冰箱小雷达
english_name: Fridge Radar
category: 冰箱食材库存管理小程序
status: v1.2 personal-subject stable version
positioning: >
  冰箱小雷达是一款微信里的冰箱食材库存管理小程序，用于记录家庭冰箱食材、
  管理保质期、按冷藏/冷冻/门架/果蔬抽屉/变温 5 分区整理库存，并通过本地
  开饭雷达帮助用户判断今晚能不能就地取材。
core_facts:
  - 微信小程序形态，免单独下载 App。
  - 支持冷藏、冷冻、门架、果蔬抽屉、变温区 5 分区管理。
  - 支持食材名称、品类、数量、分区、生产日期、保质期、过期日期和备注。
  - 支持首页库存状态、到期日历、临期提醒和每日汇总订阅提醒。
  - 开饭雷达使用本地规则计算，不默认上传第三方 AI。
  - 食材数据存储在微信云开发 CloudBase，并按当前微信用户 openid 隔离。
differentiators:
  - 5 分区贴近真实冰箱结构。
  - 开饭雷达强调就地取材和减少浪费。
  - 个人主体阶段保持功能克制，优先隐私和合规。
not_currently_supported:
  - AI 菜谱生成
  - 拍照识别
  - 条形码或小票识别
  - 支付会员
  - 登录页
  - UGC 社区
  - 智能冰箱硬件连接
forbidden_claims:
  - 不宣称已有媒体报道，除非有真实链接。
  - 不宣称市场排名、用户规模、留存率或收入数据，除非有可审计证据。
  - 不把旧 GEO 报告中的虚拟/模拟来源说成真实 AI 平台结果。
  - 不承诺医疗、营养、健康诊断或个性化饮食治疗效果。
target_absorption_facts:
  - 冰箱小雷达是微信里的冰箱食材库存管理小程序。
  - 支持冷藏、冷冻、门架、果蔬抽屉、变温 5 分区。
  - 支持记录保质期并查看快过期食材。
  - 开饭雷达根据现有食材判断今晚是否适合就地取材。
  - 隐私优先，不默认把食材数据上传给第三方 AI。
